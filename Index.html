<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Fácil</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#ffffff;
  color:#333;
  font-size:20px;
  margin:0;
}

/* HEADER */
.header{
  position: sticky;
  top:0;
  background:#7FAFA8;
  text-align:center;
  padding:15px;
}

.header img{
  width:80px;
}

/* CONTENEDOR */
.container{
  padding:15px;
}

/* FILTROS GRANDES */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
  margin-bottom:20px;
}

.filters button{
  font-size:18px;
  padding:14px 18px;
  border:none;
  border-radius:25px;
  background:#ddd;
  cursor:pointer;
}

.filters button.active{
  background:#7FAFA8;
  color:white;
}

/* PRODUCTOS */
.card{
  border-bottom:2px solid #eee;
  padding:20px 10px;
  text-align:center;
}

.card img{
  width:100%;
  max-width:280px;
  height:auto;
  border-radius:10px;
}

.card h3{
  font-size:22px;
  margin:10px 0;
}

.desc{
  font-size:18px;
  margin:5px 0;
}

.price{
  font-size:24px;
  font-weight:bold;
  color:#7FAFA8;
}

/* BOTONES FLOTANTES */
.floating-buttons{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.fab{
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  border:none;
  cursor:pointer;
}

/* SUBIR */
.scroll-top{
  background:#7FAFA8;
  color:white;
  opacity:0;
}

.scroll-top.show{
  opacity:1;
}

/* WHATSAPP */
.whatsapp{
  background:#25D366;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header class="header">
  <img src="images/logo.png" alt="Logo">
</header>

<div class="container">

  <div class="filters">
    <button onclick="filterMenu('all')" class="active">Todo</button>
    <button onclick="filterMenu('bebidas_calientes')">Café</button>
    <button onclick="filterMenu('bebidas_frias')">Frías</button>
    <button onclick="filterMenu('dulces')">Dulces</button>
    <button onclick="filterMenu('salados')">Salados</button>
    <button onclick="filterMenu('tortas')">Tortas</button>
    <button onclick="filterMenu('postres')">Postres</button>
    <button onclick="filterMenu('meriendas')">Meriendas</button>
  </div>

  <div id="menu"></div>

</div>

<!-- BOTONES -->
<div class="floating-buttons">
  <button class="fab scroll-top" id="scrollTopBtn">↑</button>
  <a class="fab whatsapp" href="https://wa.me/598095662193">📞</a>
</div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vT4Jlrqj7FGzviBaDj5UE15EPxPG0cqsNb8ihQ2rO3DUOFo69OioIroCADsJYXifA/pub?gid=350585094&single=true&output=csv";

let data=[];

async function load(){
  const res=await fetch(URL);
  const text=await res.text();
  const rows=text.split("\r\n");

  data = rows.map(r=>{
    const [id,name,desc,price,img,cat]=r.split(",");
    return {id,name,desc,price,img,cat};
  }).filter(i=>i.id);

  render();
}

function render(filter='all'){
  const menu=document.getElementById("menu");
  menu.innerHTML="";

  data.filter(item=>filter==='all'||item.cat===filter)
      .forEach(item=>{
        menu.innerHTML+=`
        <div class="card">
          <h3>${item.name}</h3>
          <img src="${item.img || 'images/sinimagen.png'}">
          <p class="desc">${item.desc || ""}</p>
          <p class="price">$${item.price}</p>
        </div>`;
      });
}

function filterMenu(cat){
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'))
  event.target.classList.add('active')
  render(cat)
}

/* BOTÓN SUBIR */
const btn=document.getElementById("scrollTopBtn");

window.addEventListener("scroll",()=>{
  if(window.scrollY>200){
    btn.classList.add("show");
  }else{
    btn.classList.remove("show");
  }
});

btn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

load();

</script>

</body>
</html>
